<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSI 타겟 가격 계산기</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000; --bg2: #0d1117; --sidebar: #0a0a0a;
    --border: #1e2535; --text: #e0e0e0; --muted: #8b92a0;
    --accent: #4fc3f7; --green: #26a69a; --red: #ef5350;
    --yellow: #ffeb3b; --purple: #ce93d8;
    --card: #111827; --tab-active: #1d2b3a;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; padding: 16px 14px 24px; gap: 14px; }
  #main { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }

  /* ── Sidebar ── */
  .app-title { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .app-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .divider { border: none; border-top: 1px solid var(--border); }

  .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .preset-btn { background: #1a1f2e; border: 1px solid var(--border); color: var(--text); padding: 5px 4px; border-radius: 6px; cursor: pointer; font-size: 11px; text-align: center; transition: background .15s, border-color .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preset-btn:hover { background: #232c3e; border-color: var(--accent); }
  .preset-btn.active { background: var(--tab-active); border-color: var(--accent); color: var(--accent); }

  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  select, input[type=text], input[type=number] {
    width: 100%; background: #111827; border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 7px; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: #111827; }

  #run-btn {
    width: 100%; padding: 10px; background: #1565c0; border: none; border-radius: 8px;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s;
  }
  #run-btn:hover { background: #1976d2; }
  #run-btn:disabled { background: #333; cursor: not-allowed; }

  /* ── Metrics ── */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 700; color: #fff; }
  .metric-badge { display: inline-block; font-size: 11px; margin-top: 5px; padding: 2px 8px; border-radius: 12px; }
  .badge-red    { background: rgba(239,83,80,.2); color: #ef9a9a; }
  .badge-green  { background: rgba(38,166,154,.2); color: #80cbc4; }
  .badge-gray   { background: rgba(100,100,100,.2); color: #9e9e9e; }

  /* ── Section header ── */
  .section-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* ── Tabs ── */
  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .tab-btn { padding: 7px 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; transition: color .15s, border-color .15s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Table ── */
  .rsi-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rsi-table th { text-align: left; padding: 8px 12px; background: #0d1117; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  .rsi-table td { padding: 8px 12px; border-bottom: 1px solid rgba(30,37,53,.6); }
  .rsi-table tr:last-child td { border-bottom: none; }
  .rsi-table tr:hover td { background: rgba(255,255,255,.03); }
  .val-up   { color: #ef9a9a; }
  .val-dn   { color: #80cbc4; }
  .val-cur  { color: var(--yellow); font-weight: 600; }

  /* ── Chart container ── */
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 20px; min-height: 200px; }
  .chart-inner { width: 100%; }

  /* ── Accordion ── */
  .accordion { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .accordion-hdr { padding: 13px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: var(--card); font-weight: 500; user-select: none; }
  .accordion-hdr:hover { background: #151c2a; }
  .accordion-arrow { transition: transform .2s; font-size: 10px; }
  .accordion-body { display: none; padding: 16px; background: var(--bg2); border-top: 1px solid var(--border); }
  .accordion.open .accordion-arrow { transform: rotate(180deg); }
  .accordion.open .accordion-body { display: block; }

  /* ── Summary cards (Trend Vision) ── */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
  .sum-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .sum-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .sum-value { font-size: 16px; font-weight: 700; color: #fff; margin-top: 4px; }

  /* ── Status / loading ── */
  #status-bar { font-size: 12px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #ef9a9a; font-size: 13px; padding: 10px 14px; background: rgba(239,83,80,.1); border: 1px solid rgba(239,83,80,.3); border-radius: 8px; }

  /* ── Ticker dropdown ── */
  .ticker-row { display: flex; gap: 6px; }
  .refresh-btn { padding: 7px 10px; background: #1a1f2e; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3044; border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; min-width: unset; height: auto; overflow: visible; }
    #main { overflow: visible; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .metrics-grid { grid-template-columns: 1fr 1fr; }
    .preset-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div id="app">

<!-- ══ SIDEBAR ═══════════════════════════════════════════════════════════════ -->
<aside id="sidebar">
  <div>
    <div class="app-title">📈 RSI 타겟 가격 계산기</div>
    <div class="app-sub">현재 RSI와 타겟 RSI 달성에 필요한 가격을 계산합니다.</div>
  </div>

  <hr class="divider">

  <div>
    <div class="section-label">주요 지수</div>
    <div class="preset-grid" id="preset-grid"></div>
  </div>

  <hr class="divider">

  <div>
    <div class="section-label">구글시트 종목</div>
    <div class="ticker-row">
      <select id="sheet-select" style="flex:1"><option value="">— 선택 —</option></select>
      <button class="refresh-btn" id="sheet-refresh" title="새로고침">↻</button>
    </div>
  </div>

  <hr class="divider">

  <div>
    <label for="ticker-input">심볼 직접 입력</label>
    <input type="text" id="ticker-input" value="^GSPC"
      placeholder="AAPL, TSLA, ^GSPC, 005930 …">
  </div>

  <div>
    <label for="period-input">RSI 기간 (봉 수)</label>
    <input type="number" id="period-input" value="14" min="2" max="50">
  </div>

  <div>
    <label for="interval-select">차트 간격</label>
    <select id="interval-select">
      <option value="1wk" selected>주봉</option>
      <option value="1d">일봉</option>
      <option value="1mo">월봉</option>
      <option value="1h">1시간</option>
      <option value="4h">4시간</option>
      <option value="15m">15분</option>
    </select>
  </div>

  <div>
    <label for="lookback-select">조회 기간</label>
    <select id="lookback-select">
      <option value="3mo">3개월</option>
      <option value="6mo">6개월</option>
      <option value="1y">1년</option>
      <option value="2y">2년</option>
      <option value="5y" selected>5년</option>
      <option value="10y">10년</option>
      <option value="15y">15년</option>
    </select>
  </div>

  <button id="run-btn">계산하기</button>
</aside>

<!-- ══ MAIN ══════════════════════════════════════════════════════════════════ -->
<main id="main">
  <div id="status-bar"></div>
  <div id="content"></div>
</main>

</div><!-- #app -->

<script>
'use strict';

// ── 상수 ──────────────────────────────────────────────────────────────────────
const PRESETS = [
  { label: 'S&P 500',   sym: '^GSPC' },
  { label: '나스닥100', sym: '^NDX'  },
  { label: '나스닥',    sym: '^IXIC' },
  { label: '코스피',    sym: '^KS11' },
  { label: '코스닥',    sym: '^KQ11' },
  { label: '다우',      sym: '^DJI'  },
];

const MA_COLORS = { '20':'#ff0000','60':'#00cc00','125':'#3399ff','200':'#ffff00','240':'#ff8800','365':'#cccccc' };
const PLOTLY_BASE = {
  paper_bgcolor: '#000000', plot_bgcolor: '#0d1117',
  font: { color: '#e0e0e0', size: 12 },
  margin: { l: 10, r: 80, t: 40, b: 10 },
  legend: { orientation: 'h', y: 1.02, font: { size: 11 } },
};

// ── State ─────────────────────────────────────────────────────────────────────
let state = { ticker: '^GSPC', data: null };

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $content  = document.getElementById('content');
const $status   = document.getElementById('status-bar');
const $runBtn   = document.getElementById('run-btn');
const $ticker   = document.getElementById('ticker-input');
const $period   = document.getElementById('period-input');
const $interval = document.getElementById('interval-select');
const $lookback = document.getElementById('lookback-select');
const $sheet    = document.getElementById('sheet-select');

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  buildPresets();
  loadSheetTickers();

  $runBtn.addEventListener('click', runAnalysis);
  $ticker.addEventListener('keydown', e => { if (e.key === 'Enter') runAnalysis(); });
  $sheet.addEventListener('change', () => {
    const v = $sheet.value;
    if (v) { $ticker.value = v; syncPresets(v); }
  });
  document.getElementById('sheet-refresh').addEventListener('click', loadSheetTickers);

  runAnalysis();
}

function buildPresets() {
  const grid = document.getElementById('preset-grid');
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.label;
    btn.dataset.sym = p.sym;
    btn.addEventListener('click', () => {
      $ticker.value = p.sym;
      syncPresets(p.sym);
      runAnalysis();
    });
    grid.appendChild(btn);
  });
  syncPresets($ticker.value);
}

function syncPresets(sym) {
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sym === sym);
  });
}

async function loadSheetTickers() {
  try {
    const res = await fetch('/api/sheets');
    const data = await res.json();
    if (data.error || !data.tickers) return;
    $sheet.innerHTML = '<option value="">— 선택 —</option>';
    data.tickers.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.ticker;
      opt.textContent = `${t.name}  (${t.ticker})`;
      $sheet.appendChild(opt);
    });
  } catch (_) {}
}

// ── Main analysis ─────────────────────────────────────────────────────────────
async function runAnalysis() {
  const ticker  = $ticker.value.trim() || '^GSPC';
  const period  = parseInt($period.value) || 14;
  const interval = $interval.value;
  const lookback = $lookback.value;

  setStatus('loading', `${ticker} 데이터 로딩 중…`);
  $runBtn.disabled = true;

  try {
    const url = `/api/analyze?ticker=${encodeURIComponent(ticker)}&period=${period}&interval=${interval}&lookback=${lookback}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      setStatus('error', data.error);
      return;
    }

    state.data = data;
    syncPresets(data.resolved);
    setStatus('ok', `${data.resolved.toUpperCase()}  ·  ${data.interval}  ·  ${data.date}`);
    renderAll(data);
    // 비동기로 추가 차트 로드
    loadTrendChart(data.resolved);
    loadLensChart(data.resolved);

  } catch (e) {
    setStatus('error', e.message);
  } finally {
    $runBtn.disabled = false;
  }
}

// ── Render all ────────────────────────────────────────────────────────────────
function renderAll(data) {
  $content.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.innerHTML = `<h2 style="font-size:18px;font-weight:700;color:#fff;margin-bottom:16px;">
    ${data.resolved.toUpperCase()}
    <span style="font-size:13px;color:var(--muted);font-weight:400;margin-left:8px;">${intervalLabel(data.interval)} · ${data.date}</span>
  </h2>`;
  $content.appendChild(header);

  // Metrics
  $content.appendChild(renderMetrics(data));

  // Tables
  const tableSection = document.createElement('div');
  tableSection.style.marginBottom = '24px';
  tableSection.innerHTML = `<div class="section-title">📋 타겟 RSI별 예상 가격</div>`;
  tableSection.appendChild(renderTables(data));
  $content.appendChild(tableSection);

  // Main chart
  const chartSection = document.createElement('div');
  chartSection.style.marginBottom = '24px';
  chartSection.innerHTML = `<div class="section-title">📊 차트</div>`;
  const mainChartWrap = document.createElement('div');
  mainChartWrap.className = 'chart-wrap';
  const mainChartDiv = document.createElement('div');
  mainChartDiv.id = 'chart-main';
  mainChartDiv.className = 'chart-inner';
  mainChartWrap.appendChild(mainChartDiv);
  chartSection.appendChild(mainChartWrap);
  $content.appendChild(chartSection);
  renderMainChart(data);

  // Trend Vision + Multi Lens (accordion)
  const trendAccordion = makeAccordion('📈 Trend Vision (주봉)', 'acc-trend', `
    <div id="chart-trend" style="width:100%;min-height:400px;"></div>
    <div id="trend-summary"></div>
  `);
  $content.appendChild(trendAccordion);

  const lensAccordion = makeAccordion('📉 Multi Lens (일봉)', 'acc-lens', `
    <div id="chart-lens" style="width:100%;min-height:600px;"></div>
  `);
  $content.appendChild(lensAccordion);

  // Formula explanation
  $content.appendChild(makeAccordion('📖 계산 방식 설명', 'acc-formula', formulaHtml(data.period_rsi)));
}

// ── Metrics ───────────────────────────────────────────────────────────────────
function renderMetrics(data) {
  const grid = document.createElement('div');
  grid.className = 'metrics-grid';

  const items = [
    { label: '현재 가격', value: fmtPrice(data.current_price), badge: null },
    { label: 'Wilder RSI', value: data.rsi.wilder.toFixed(2), badge: rsiBadge(data.rsi.wilder) },
    { label: 'Cutler RSI (SMA)', value: data.rsi.cutler.toFixed(2), badge: rsiBadge(data.rsi.cutler) },
    { label: 'EMA RSI', value: data.rsi.ema.toFixed(2), badge: rsiBadge(data.rsi.ema) },
  ];

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.innerHTML = `
      <div class="metric-label">${item.label}</div>
      <div class="metric-value">${item.value}</div>
      ${item.badge ? `<span class="metric-badge ${item.badge.cls}">${item.badge.txt}</span>` : ''}
    `;
    grid.appendChild(card);
  });
  return grid;
}

function rsiBadge(v) {
  if (v >= 70) return { cls: 'badge-red',   txt: '🔴 과매수' };
  if (v <= 30) return { cls: 'badge-green', txt: '🟢 과매도' };
  return { cls: 'badge-gray', txt: '⚪ 중립' };
}

// ── Tables ────────────────────────────────────────────────────────────────────
function renderTables(data) {
  const tabs = [
    { key: 'wilder', label: '📊 Wilder (표준)', rsi: data.rsi.wilder },
    { key: 'cutler', label: '📊 Cutler (SMA)',  rsi: data.rsi.cutler },
    { key: 'ema',    label: '📊 EMA RSI',       rsi: data.rsi.ema    },
  ];

  const wrap = document.createElement('div');
  const bar  = document.createElement('div'); bar.className = 'tab-bar';
  const panes = document.createElement('div');

  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      wrap.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      wrap.querySelector(`#tab-pane-${t.key}`).classList.add('active');
    });
    bar.appendChild(btn);

    const pane = document.createElement('div');
    pane.className = 'tab-pane' + (i === 0 ? ' active' : '');
    pane.id = `tab-pane-${t.key}`;
    pane.innerHTML = buildTableHtml(data.tables[t.key], t.rsi);
    panes.appendChild(pane);
  });

  wrap.appendChild(bar);
  wrap.appendChild(panes);
  return wrap;
}

function buildTableHtml(rows, curRsi) {
  const current_price = state.data?.current_price;
  let html = `<div style="overflow-x:auto;">
    <table class="rsi-table">
      <thead><tr>
        <th>타겟 RSI</th><th>예상 가격</th><th>등락률</th><th>방향</th>
      </tr></thead><tbody>`;

  rows.forEach(r => {
    const isCur = Math.abs(r.target_rsi - curRsi) < 1.5;
    const isOB  = r.target_rsi >= 70;
    const isOS  = r.target_rsi <= 30;
    const cls   = isCur ? 'val-cur' : (isOB ? 'val-up' : (isOS ? 'val-dn' : ''));
    const priceStr = r.price != null ? fmtPrice(r.price) : '<span style="color:var(--muted)">계산 불가</span>';
    const pctStr   = r.change_pct != null ? `<span style="color:${r.change_pct >= 0 ? '#ef9a9a':'#80cbc4'}">${r.change_pct >= 0 ? '+' : ''}${r.change_pct.toFixed(2)}%</span>` : '-';
    html += `<tr class="${cls}">
      <td>${r.target_rsi.toFixed(2)}</td>
      <td>${priceStr}</td>
      <td>${pctStr}</td>
      <td>${r.direction}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

// ── Main Chart ────────────────────────────────────────────────────────────────
function renderMainChart(data) {
  const c = data.chart;
  const traces = [];

  // Candlestick
  traces.push({
    type: 'candlestick',
    x: c.dates, open: c.open, high: c.high, low: c.low, close: c.close,
    name: '가격',
    increasing: { line: { color: '#26a69a' } },
    decreasing: { line: { color: '#ef5350' } },
    xaxis: 'x', yaxis: 'y',
  });

  // MAs
  Object.entries(c.ma).forEach(([p, vals]) => {
    traces.push({
      type: 'scatter', x: c.dates, y: vals,
      name: `MA${p}`, line: { color: MA_COLORS[p] || '#888', width: 1 },
      opacity: 0.75, xaxis: 'x', yaxis: 'y',
    });
  });

  // Target lines as shapes + annotations
  const shapes = [], annotations = [];
  if (data.current_price) {
    shapes.push({ type: 'line', x0: c.dates[0], x1: c.dates[c.dates.length-1], y0: data.current_price, y1: data.current_price, line: { color: '#ffeb3b', width: 1.5 }, xref: 'x', yref: 'y' });
    annotations.push({ x: 1, xref: 'paper', y: data.current_price, yref: 'y', text: `현재 ${fmtPrice(data.current_price)}`, showarrow: false, xanchor: 'left', font: { color: '#ffeb3b', size: 10 } });
  }
  c.target_lines.forEach(tl => {
    if (!tl.price) return;
    const color = tl.target_rsi >= 70 ? '#ef9a9a' : (tl.target_rsi <= 30 ? '#4fc3f7' : '#bdbdbd');
    shapes.push({ type: 'line', x0: c.dates[0], x1: c.dates[c.dates.length-1], y0: tl.price, y1: tl.price, line: { color, width: 1, dash: tl.is_fixed ? 'dot' : 'dash' }, xref: 'x', yref: 'y' });
    annotations.push({ x: 1, xref: 'paper', y: tl.price, yref: 'y', text: `RSI ${tl.target_rsi}  (${tl.change_pct >= 0 ? '+' : ''}${tl.change_pct?.toFixed(1)}%)`, showarrow: false, xanchor: 'left', font: { color, size: 10 } });
  });

  // RSI traces
  [
    { key: 'rsi_wilder', color: '#4fc3f7', name: `Wilder(${data.period_rsi})` },
    { key: 'rsi_cutler', color: '#a5d6a7', name: `Cutler(${data.period_rsi})` },
    { key: 'rsi_ema',    color: '#ce93d8', name: `EMA(${data.period_rsi})` },
  ].forEach(r => {
    traces.push({ type: 'scatter', x: c.dates, y: c[r.key], name: r.name, line: { color: r.color, width: 1.5 }, xaxis: 'x', yaxis: 'y2' });
  });

  // RSI reference lines
  [70, 50, 30].forEach(lvl => {
    const color = lvl === 70 ? 'rgba(239,83,80,.5)' : lvl === 30 ? 'rgba(38,166,154,.5)' : 'rgba(158,158,158,.4)';
    shapes.push({ type: 'line', x0: c.dates[0], x1: c.dates[c.dates.length-1], y0: lvl, y1: lvl, line: { color, width: 1, dash: 'dot' }, xref: 'x', yref: 'y2' });
  });

  const layout = {
    ...PLOTLY_BASE,
    height: 750,
    xaxis: { showgrid: false, rangeslider: { visible: false }, domain: [0, 1] },
    yaxis:  { title: '가격', domain: [0.38, 1], showgrid: true, gridcolor: '#1e1e2e' },
    yaxis2: { title: 'RSI', domain: [0, 0.34], range: [0, 100], showgrid: true, gridcolor: '#1e1e2e' },
    shapes, annotations,
    margin: { l: 10, r: 85, t: 30, b: 10 },
  };

  Plotly.newPlot('chart-main', traces, layout, { responsive: true, displayModeBar: true, displaylogo: false });
}

// ── Trend Vision ──────────────────────────────────────────────────────────────
async function loadTrendChart(ticker) {
  try {
    const res  = await fetch(`/api/trend?ticker=${encodeURIComponent(ticker)}&lookback=5y`);
    const data = await res.json();
    if (data.error) return;
    renderTrendChart(data, ticker);
  } catch (_) {}
}

function renderTrendChart(d, ticker) {
  const traces = [];
  const shapes = bgBands(d.dates, d.is_up);

  traces.push({
    type: 'candlestick', x: d.dates, open: d.open, high: d.high, low: d.low, close: d.close,
    name: 'Price', increasing: { line: { color: '#26a69a' } }, decreasing: { line: { color: '#ef5350' } },
    showlegend: false, xaxis: 'x', yaxis: 'y',
  });
  traces.push({ type: 'scatter', x: d.dates, y: d.ma20, name: 'MA20', line: { color: '#f59e0b', width: 1.2 }, xaxis: 'x', yaxis: 'y' });
  traces.push({ type: 'scatter', x: d.dates, y: d.ma60, name: 'MA60', line: { color: '#60a5fa', width: 1.2 }, xaxis: 'x', yaxis: 'y' });
  traces.push({ type: 'scatter', x: d.dates, y: d.supertrend, name: 'ST', line: { color: 'rgba(255,255,255,.3)', width: 1, dash: 'dot' }, showlegend: false, xaxis: 'x', yaxis: 'y' });

  // Signal annotations
  const annotations = [];
  d.signals.forEach(s => {
    if (s.side === 'UP')     annotations.push({ x: s.date, y: s.price * 0.993, text: '▲ UP',     showarrow: false, font: { color: '#00e676', size: 10, family: 'Arial Black' }, xref: 'x', yref: 'y' });
    if (s.side === 'DOWN')   annotations.push({ x: s.date, y: s.price * 1.007, text: '▼ DOWN',   showarrow: false, font: { color: '#ff5252', size: 10, family: 'Arial Black' }, xref: 'x', yref: 'y' });
    if (s.side === 'BOTTOM') annotations.push({ x: s.date, y: s.price * 0.986, text: '◆ BOTTOM', showarrow: false, font: { color: '#ffd700', size: 11, family: 'Arial Black' }, xref: 'x', yref: 'y' });
  });

  // MACD panel
  const barClr = d.macd_hist.map(v => (v == null ? '#888' : v >= 0 ? '#26a69a' : '#ef5350'));
  traces.push({ type: 'bar',     x: d.dates, y: d.macd_hist,   marker: { color: barClr }, name: 'MACD Hist', showlegend: false, xaxis: 'x', yaxis: 'y2' });
  traces.push({ type: 'scatter', x: d.dates, y: d.macd,        name: 'MACD',   line: { color: '#60a5fa', width: 1 }, showlegend: false, xaxis: 'x', yaxis: 'y2' });
  traces.push({ type: 'scatter', x: d.dates, y: d.macd_signal, name: 'Signal', line: { color: '#f59e0b', width: 1 }, showlegend: false, xaxis: 'x', yaxis: 'y2' });

  const layout = {
    ...PLOTLY_BASE,
    title: { text: `${ticker.toUpperCase()} — Trend Vision (주봉)`, font: { size: 14 } },
    height: 560,
    xaxis:  { showgrid: false, rangeslider: { visible: false } },
    yaxis:  { domain: [0.3, 1], showgrid: true, gridcolor: '#1e1e2e' },
    yaxis2: { domain: [0, 0.27], showgrid: true, gridcolor: '#1e1e2e' },
    shapes, annotations,
    margin: { l: 10, r: 10, t: 45, b: 10 },
  };

  Plotly.newPlot('chart-trend', traces, layout, { responsive: true, displayModeBar: true, displaylogo: false });

  // Summary cards
  const s = d.summary;
  const summaryEl = document.getElementById('trend-summary');
  if (summaryEl) {
    const trendColor = s.is_up ? '#80cbc4' : '#ef9a9a';
    summaryEl.innerHTML = `<div class="summary-grid">
      <div class="sum-card"><div class="sum-label">추세</div><div class="sum-value" style="color:${trendColor}">${s.is_up ? '📈 상승' : '📉 하락'}</div></div>
      <div class="sum-card"><div class="sum-label">RSI(14)</div><div class="sum-value">${s.rsi.toFixed(1)}</div></div>
      <div class="sum-card"><div class="sum-label">MACD</div><div class="sum-value" style="font-size:14px">${s.macd.toFixed(4)} <span style="font-size:11px;color:${s.macd_hist>=0?'#80cbc4':'#ef9a9a'}">${s.macd_hist>=0?'+':''}${s.macd_hist.toFixed(4)}</span></div></div>
      ${s.vs_ma20 != null ? `<div class="sum-card"><div class="sum-label">vs MA20</div><div class="sum-value" style="color:${s.vs_ma20>=0?'#ef9a9a':'#80cbc4'};font-size:16px">${s.vs_ma20>=0?'+':''}${s.vs_ma20.toFixed(2)}%</div></div>` : ''}
      ${s.vs_ma60 != null ? `<div class="sum-card"><div class="sum-label">vs MA60</div><div class="sum-value" style="color:${s.vs_ma60>=0?'#ef9a9a':'#80cbc4'};font-size:16px">${s.vs_ma60>=0?'+':''}${s.vs_ma60.toFixed(2)}%</div></div>` : ''}
    </div>`;
  }
}

// ── Multi Lens ────────────────────────────────────────────────────────────────
async function loadLensChart(ticker) {
  try {
    const res  = await fetch(`/api/lens?ticker=${encodeURIComponent(ticker)}&lookback=2y`);
    const data = await res.json();
    if (data.error) return;
    renderLensChart(data, ticker);
  } catch (_) {}
}

function renderLensChart(d, ticker) {
  const traces = [];
  const shapes = bgBands(d.dates, d.is_up);
  const annotations = [];

  d.signals.forEach(s => {
    const sz = Math.min(16, 9 + Math.abs(s.score || 0));
    if (s.side === 'UP')   annotations.push({ x: s.date, y: s.price * 0.995, text: '▲ UP',   showarrow: false, font: { color: '#00e676', size: sz, family: 'Arial Black' }, xref: 'x', yref: 'y' });
    if (s.side === 'DOWN') annotations.push({ x: s.date, y: s.price * 1.005, text: '▼ DOWN', showarrow: false, font: { color: '#ff5252', size: sz, family: 'Arial Black' }, xref: 'x', yref: 'y' });
  });

  const xa = (n) => `x${n === 1 ? '' : n}`;
  const ya = (n) => `y${n === 1 ? '' : n}`;

  // Panel 1: Candle
  traces.push({ type: 'candlestick', x: d.dates, open: d.open, high: d.high, low: d.low, close: d.close, name: 'Price', increasing: { line: { color: '#26a69a' } }, decreasing: { line: { color: '#ef5350' } }, showlegend: false, xaxis: xa(1), yaxis: ya(1) });
  traces.push({ type: 'scatter', x: d.dates, y: d.ma20, name: 'MA20', line: { color: '#f59e0b', width: 1.2 }, xaxis: xa(1), yaxis: ya(1) });
  traces.push({ type: 'scatter', x: d.dates, y: d.ma60, name: 'MA60', line: { color: '#60a5fa', width: 1.2 }, xaxis: xa(1), yaxis: ya(1) });
  traces.push({ type: 'scatter', x: d.dates, y: d.bb_upper, name: 'BB', line: { color: 'rgba(147,51,234,.55)', width: 1, dash: 'dot' }, xaxis: xa(1), yaxis: ya(1) });
  traces.push({ type: 'scatter', x: d.dates, y: d.bb_lower, showlegend: false, fill: 'tonexty', fillcolor: 'rgba(147,51,234,.05)', line: { color: 'rgba(147,51,234,.55)', width: 1, dash: 'dot' }, xaxis: xa(1), yaxis: ya(1) });

  // Panel 2: RSI
  traces.push({ type: 'scatter', x: d.dates, y: d.rsi, name: 'RSI', line: { color: '#a78bfa', width: 1.5 }, showlegend: false, xaxis: xa(2), yaxis: ya(2) });

  // Panel 3: MACD
  const barClr = d.macd_hist.map(v => v == null ? '#888' : v >= 0 ? '#26a69a' : '#ef5350');
  traces.push({ type: 'bar',     x: d.dates, y: d.macd_hist,   marker: { color: barClr }, name: 'Hist',   showlegend: false, xaxis: xa(3), yaxis: ya(3) });
  traces.push({ type: 'scatter', x: d.dates, y: d.macd,        name: 'MACD',   line: { color: '#60a5fa', width: 1 }, showlegend: false, xaxis: xa(3), yaxis: ya(3) });
  traces.push({ type: 'scatter', x: d.dates, y: d.macd_signal, name: 'Signal', line: { color: '#f59e0b', width: 1 }, showlegend: false, xaxis: xa(3), yaxis: ya(3) });

  // Panel 4: BB%B
  traces.push({ type: 'scatter', x: d.dates, y: d.bb_pct, name: 'BB%B', line: { color: '#c084fc', width: 1.5 }, showlegend: false, xaxis: xa(4), yaxis: ya(4) });

  // Panel 5: Stochastic
  traces.push({ type: 'scatter', x: d.dates, y: d.stoch_k, name: '%K', line: { color: '#f472b6', width: 1.5 }, showlegend: false, xaxis: xa(5), yaxis: ya(5) });
  traces.push({ type: 'scatter', x: d.dates, y: d.stoch_d, name: '%D', line: { color: '#fb923c', width: 1 },   showlegend: false, xaxis: xa(5), yaxis: ya(5) });

  // Panel 6: CCI
  const cciClr = d.cci.map(v => v == null ? '#888' : v >= 0 ? '#26a69a' : '#ef5350');
  traces.push({ type: 'bar', x: d.dates, y: d.cci, marker: { color: cciClr }, name: 'CCI', showlegend: false, xaxis: xa(6), yaxis: ya(6) });

  // Panel 7: ADX
  traces.push({ type: 'scatter', x: d.dates, y: d.adx,      name: 'ADX',  line: { color: '#fbbf24', width: 1.8 }, showlegend: false, xaxis: xa(7), yaxis: ya(7) });
  traces.push({ type: 'scatter', x: d.dates, y: d.plus_di,  name: '+DI',  line: { color: '#34d399', width: 1 },   showlegend: false, xaxis: xa(7), yaxis: ya(7) });
  traces.push({ type: 'scatter', x: d.dates, y: d.minus_di, name: '-DI',  line: { color: '#f87171', width: 1 },   showlegend: false, xaxis: xa(7), yaxis: ya(7) });

  const domains = [[0.73,1],[0.60,0.71],[0.47,0.58],[0.34,0.45],[0.21,0.32],[0.11,0.19],[0,0.09]];
  const titles  = ['', 'RSI(14)', 'MACD', 'BB %B', 'Stoch(14)', 'CCI(20)', 'ADX(14)'];

  const axisLayout = {};
  for (let i = 1; i <= 7; i++) {
    const xk = i === 1 ? 'xaxis'  : `xaxis${i}`;
    const yk = i === 1 ? 'yaxis'  : `yaxis${i}`;
    axisLayout[xk] = { showgrid: false, rangeslider: { visible: false }, anchor: `y${i === 1 ? '' : i}`, matches: 'x' };
    axisLayout[yk] = { domain: domains[i-1], showgrid: true, gridcolor: '#1e1e2e', title: { text: titles[i-1], font: { size: 10 } }, anchor: `x${i === 1 ? '' : i}` };
  }
  axisLayout.yaxis2.range = [0, 100];
  axisLayout.yaxis5.range = [0, 100];

  // Reference hlines as shapes
  const refShapes = bgBands(d.dates, d.is_up);
  const addRef = (yref, y, color) => refShapes.push({ type: 'line', x0: d.dates[0], x1: d.dates[d.dates.length-1], y0: y, y1: y, line: { color, width: 1, dash: 'dot' }, xref: 'x', yref });
  addRef('y2', 70, 'rgba(239,83,80,.5)'); addRef('y2', 50, 'rgba(255,255,255,.2)'); addRef('y2', 30, 'rgba(38,166,154,.5)');
  addRef('y4', 1, 'rgba(239,83,80,.5)'); addRef('y4', .5, 'rgba(255,255,255,.2)'); addRef('y4', 0, 'rgba(38,166,154,.5)');
  addRef('y5', 80, 'rgba(239,83,80,.5)'); addRef('y5', 20, 'rgba(38,166,154,.5)');
  addRef('y6', 100, 'rgba(239,83,80,.5)'); addRef('y6', -100, 'rgba(38,166,154,.5)');
  addRef('y7', 25, 'rgba(255,255,255,.2)');

  const layout = {
    ...PLOTLY_BASE,
    title: { text: `${ticker.toUpperCase()} — Multi Lens (일봉)`, font: { size: 14 } },
    height: 920,
    ...axisLayout,
    shapes: refShapes,
    annotations,
    margin: { l: 10, r: 10, t: 45, b: 10 },
  };

  Plotly.newPlot('chart-lens', traces, layout, { responsive: true, displayModeBar: true, displaylogo: false });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function bgBands(dates, isUp) {
  const shapes = []; let i = 0;
  while (i < dates.length) {
    const color = isUp[i] ? 'rgba(0,160,0,.1)' : 'rgba(200,0,0,.1)';
    let j = i + 1;
    while (j < dates.length && isUp[j] === isUp[i]) j++;
    shapes.push({ type: 'rect', x0: dates[i], x1: dates[j-1], y0: 0, y1: 1, yref: 'paper', fillcolor: color, opacity: 1, layer: 'below', line: { width: 0 } });
    i = j;
  }
  return shapes;
}

function makeAccordion(title, id, bodyHtml) {
  const acc = document.createElement('div');
  acc.className = 'accordion';
  acc.id = id;
  acc.innerHTML = `
    <div class="accordion-hdr">
      <span>${title}</span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body">${bodyHtml}</div>
  `;
  acc.querySelector('.accordion-hdr').addEventListener('click', () => {
    acc.classList.toggle('open');
    if (acc.classList.contains('open')) {
      // trigger Plotly resize if charts are inside
      setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
    }
  });
  return acc;
}

function formulaHtml(period) {
  return `
    <style>.ftable{border-collapse:collapse;width:100%;font-size:13px;} .ftable th,.ftable td{padding:7px 12px;border:1px solid #1e2535;} .ftable th{background:#0d1117;color:#8b92a0;}</style>
    <h4 style="margin-bottom:10px;color:#fff">RSI 계산 방식 비교</h4>
    <table class="ftable">
      <thead><tr><th>방식</th><th>평활화</th><th>alpha</th></tr></thead>
      <tbody>
        <tr><td><b>Wilder (표준)</b></td><td>EWM (adjust=False)</td><td>α = 1/${period}</td></tr>
        <tr><td><b>Cutler (SMA)</b></td><td>단순 이동평균</td><td>—</td></tr>
        <tr><td><b>EMA RSI</b></td><td>EWM (adjust=False)</td><td>α = 2/${period+1}</td></tr>
      </tbody>
    </table>
    <p style="margin-top:14px;color:#8b92a0;font-size:12px">RSI = 100 − 100 / (1 + RS),  RS = Avg Gain / Avg Loss</p>
    <h4 style="margin:14px 0 8px;color:#fff">타겟 가격 역산 (Wilder 기준)</h4>
    <p style="color:#8b92a0;font-size:12px;line-height:1.8">
      RSₜ = target_RSI / (100 − target_RSI)<br>
      <b style="color:#e0e0e0">상승 시:</b>  P = P_cur + (n−1) × (RSₜ × avg_loss − avg_gain)<br>
      <b style="color:#e0e0e0">하락 시:</b>  P = P_cur + (n−1) × (avg_loss − avg_gain / RSₜ)
    </p>
  `;
}

function fmtPrice(v) {
  if (v == null) return '-';
  if (v >= 1000) return v.toLocaleString('ko-KR', { maximumFractionDigits: 0 });
  if (v >= 10)   return v.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
  return v.toPrecision(5);
}

function intervalLabel(iv) {
  return { '1d': '일봉', '1wk': '주봉', '1mo': '월봉', '1h': '1시간', '4h': '4시간', '15m': '15분' }[iv] || iv;
}

function setStatus(type, msg) {
  if (type === 'loading') {
    $status.innerHTML = `<span class="spinner"></span>${msg}`;
  } else if (type === 'error') {
    $status.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  } else {
    $status.innerHTML = `<span style="color:var(--muted)">${msg}</span>`;
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
